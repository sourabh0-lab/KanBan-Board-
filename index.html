<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Kanban Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="app-container">
        <header>
            <h1>Project Workspace</h1>
            <div class="task-input-area">
                <input type="text" id="task-input" placeholder="What's your next move?">
                <button id="add-task-btn">
                    <span>+</span> Add Task
                </button>
            </div>
        </header>

        <main class="board">
            <div class="column">
                <div class="column-header">
                    <h2>To Do</h2>
                    <div class="task-count" id="todo-count">0</div>
                </div>
                <div class="task-list" id="todo-list"></div>
            </div>

            <div class="column">
                <div class="column-header">
                    <h2>In Progress</h2>
                    <div class="task-count" id="progress-count">0</div>
                </div>
                <div class="task-list" id="progress-list"></div>
            </div>

            <div class="column">
                <div class="column-header">
                    <h2>Done</h2>
                    <div class="task-count" id="done-count">0</div>
                </div>
                <div class="task-list" id="done-list"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
